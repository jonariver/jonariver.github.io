<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Urlaubsplaner</title>
  <link rel="icon" href="./assets/logo/freilotse-favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/logo/freilotse-favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/logo/freilotse-favicon-16.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/logo/apple-touch-icon.png">
  <meta name="theme-color" content="#0B203A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FREILOTSE">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body class="bg-slate-950">
  <div id="root"></div>
  <noscript>Bitte JavaScript aktivieren, um den Urlaubsplaner zu nutzen.</noscript>
  <script src="locales/de.js?v=3"></script>
  <!-- Reine Planungs-/Kalender-/Datenmodule (kein Modulsystem -> window.FREILOTSE.*,
       siehe CLAUDE.md, Abschnitt „Architektur/Module"). Reihenfolge untereinander
       ist unkritisch (keine Abhängigkeiten untereinander), muss aber vor den
       JSX-Dateien geladen sein. -->
  <script src="js/planning.js?v=1"></script>
  <script src="js/calendar.js?v=1"></script>
  <script src="js/data-sources.js?v=1"></script>
  <script src="js/share-link.js?v=1"></script>
  <!-- Ausgelagerte JSX-Komponenten (über Babel-Standalone verarbeitet). Reihenfolge:
       common-components zuerst (keine Abhängigkeiten), dann kofi-components
       (SiteFooter/SiteLink), danach landing-page, legal-pages und about-page
       (alle drei nutzen Komponenten aus kofi-components). app.jsx lädt zuletzt
       und mountet die App. -->
  <script type="text/babel" data-presets="react" src="jsx/common-components.jsx?v=1"></script>
  <script type="text/babel" data-presets="react" src="jsx/kofi-components.jsx?v=2"></script>
  <script type="text/babel" data-presets="react" src="jsx/landing-page.jsx?v=2"></script>
  <script type="text/babel" data-presets="react" src="jsx/legal-pages.jsx?v=1"></script>
  <script type="text/babel" data-presets="react" src="jsx/about-page.jsx?v=2"></script>
  <script type="text/babel" data-presets="react" src="app.jsx?v=6"></script>
</body>
</html>
